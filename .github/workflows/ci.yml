name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff httpx pytest pytest-asyncio

      - name: Lint with ruff
        run: ruff check backend/ scripts/

      - name: Check no secrets in source
        run: |
          # Fail if any hardcoded secret patterns are found
          ! grep -rn "SECRET_KEY\s*=\s*['\"][^'\"]" backend/ || (echo "Hardcoded SECRET_KEY found!" && exit 1)
          ! grep -rn "password\s*=\s*['\"][^'\"]" backend/routers/ || (echo "Hardcoded password found!" && exit 1)

      - name: Verify server starts
        run: |
          cd backend
          SECRET_KEY=ci-test-key-not-for-production python -c "
          from main import app
          print('App import OK:', app.title)
          "

      - name: Run tests (if any)
        run: |
          if [ -d "tests" ]; then
            cd backend
            SECRET_KEY=ci-test-key pytest ../tests/ -v
          else
            echo "No tests directory found — skipping. Consider adding tests/!"
          fi

  security-scan:
    name: Security scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit

      - name: Run bandit security scan
        run: bandit -r backend/ -ll --exclude backend/helpdesk.db

  validate-env-example:
    name: Validate .env.example
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check .env is not committed
        run: |
          if git ls-files --error-unmatch .env 2>/dev/null; then
            echo "ERROR: .env file is tracked by git. Remove it immediately!"
            exit 1
          fi
          echo ".env is not tracked — OK"

      - name: Check .env.example exists and has SECRET_KEY
        run: |
          test -f .env.example || (echo ".env.example missing!" && exit 1)
          grep -q "SECRET_KEY" .env.example || (echo "SECRET_KEY missing from .env.example!" && exit 1)
          echo ".env.example looks good"
